AWSTemplateFormatVersion: "2010-09-09"
Description: DynamoDB table for Blackjack leaderboard stats and top-10 ranking.

Parameters:
  TableName:
    Type: String
    Default: blackjack-leaderboard
    Description: DynamoDB table name for leaderboard records.

Resources:
  LeaderboardTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: gsi_pk
          AttributeType: S
        - AttributeName: win_rate_bp
          AttributeType: N
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: ByWinRate
          KeySchema:
            - AttributeName: gsi_pk
              KeyType: HASH
            - AttributeName: win_rate_bp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

Outputs:
  LeaderboardTableName:
    Description: Set this value as LEADERBOARD_TABLE in the leaderboard Lambda.
    Value: !Ref LeaderboardTable
  LeaderboardIndexName:
    Description: Set this value as LEADERBOARD_GSI_NAME in the leaderboard Lambda.
    Value: ByWinRate
